<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}VulnStore{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">VulnStore</a>
    <nav>
      <a href="{{ url_for('index') }}">Shop</a>
      <a href="{{ url_for('checkout') }}">Checkout</a>
      {% if user %}
        <a href="{{ url_for('account', user_id=user.id) }}">Account</a>
        {% if user.role == "admin" %}
          <a href="{{ url_for('admin') }}">Admin</a>
          <a href="{{ url_for('debug') }}">Status</a>
        {% endif %}
        <form class="nav-form" action="{{ url_for('logout') }}" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button type="submit">Logout</button>
        </form>
      {% else %}
        <a href="{{ url_for('login') }}">Login</a>
      {% endif %}
    </nav>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
