{% extends "base.html" %}
{% block title %}VulnStore - Login{% endblock %}
{% block content %}
<section class="form-panel">
  <h1>Login</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <label for="username">Username</label>
    <input id="username" name="username" value="alice">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" value="password123">
    <button type="submit">Sign in</button>
  </form>
  <p class="hint">Demo users: alice/password123, bob/qwerty, admin/admin.</p>
</section>
{% endblock %}
