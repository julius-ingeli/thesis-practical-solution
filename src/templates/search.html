{% extends "base.html" %}
{% block title %}VulnStore - Search{% endblock %}
{% block content %}
<section class="panel">
  <h1>Search results</h1>
  <p>Showing results for: <span class="query">{{ q|safe }}</span></p>
</section>

<section class="grid">
  {% for product in products %}
    <article class="card">
      <h2>{{ product.name }}</h2>
      <p>{{ product.description }}</p>
      <a class="button" href="{{ url_for('product', product_id=product.id) }}">View item</a>
    </article>
  {% else %}
    <p>No matching products.</p>
  {% endfor %}
</section>
{% endblock %}
