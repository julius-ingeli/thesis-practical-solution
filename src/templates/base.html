<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}VulnStore{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">VulnStore</a>
    <nav>
      <a href="{{ url_for('index') }}">Shop</a>
      <a href="{{ url_for('checkout') }}">Checkout</a>
      <a href="{{ url_for('debug') }}">Debug</a>
      {% if user %}
        <a href="{{ url_for('account', user_id=user.id) }}">Account</a>
        <a href="{{ url_for('logout') }}">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}">Login</a>
      {% endif %}
    </nav>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
