name: DevSecOps Pipeline
on: [push, pull_request]

jobs:
  security_scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Secret Scanning (Gitleaks)
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. SAST (Semgrep) - Scanning for SQLi, Cmd Injection, XSS
      
      - name: Install Semgrep
        run: python3 -m pip install semgrep

      - name: Semgrep SAST
        run: semgrep scan --config auto --error .

      # 3. SCA (Snyk) - Scanning requirements.txt
      - name: Snyk Open Source Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=src/requirements.txt --severity-threshold=high

      # 4. Container Scan (Trivy)
      - name: Build Docker Image
        run: docker build -f src/Dockerfile -t vuln-store:latest src
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vuln-store:latest'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
