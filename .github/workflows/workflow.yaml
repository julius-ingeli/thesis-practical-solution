name: DevSecOps Pipeline
on: [push, pull_request]

jobs:
  security_scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Secret Scanning (Gitleaks)
      - name: Gitlleaks Install
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin


      - name: Gitleaks Secret Scan
        run: |
          gitleaks detect  --source . --config .gitleaks.toml --report-format json --report-path results/gitleaks-report.json -v
        continue-on-error: true

      # 2. SAST (Semgrep) - Scanning for SQLi, Cmd Injection, XSS
      
      - name: Install Semgrep
        run: python3 -m pip install semgrep

      - name: Semgrep SAST
        run: semgrep scan --config auto --error .
        continue-on-error: true

      # 3. SCA (Snyk) - Scanning requirements.txt
      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk Open Source Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=src/requirements.txt --severity-threshold=high --json 
        continue-on-error: true

      # 4. Container Scan (Trivy)
      - name: Build Docker Image
        run: docker build -f src/Dockerfile -t vuln-store:latest src
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'vuln-store:latest'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
